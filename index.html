<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>I'm Sorry 🥺</title>
<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #89f7fe, #fbc2eb);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        text-align: center;
        color: #333;
    }

    .card {
        background: white;
        padding: 30px;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        width: 320px;
    }

    h1 {
        margin-bottom: 10px;
    }

    .moods button {
        margin: 5px;
        padding: 10px 15px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        font-size: 16px;
        transition: 0.2s;
    }

    .moods button:hover {
        transform: scale(1.1);
    }

    .result {
        margin-top: 20px;
        font-weight: bold;
        min-height: 40px;
    }

    .sorry-btn {
        margin-top: 20px;
        padding: 10px 20px;
        background: #ff6b81;
        color: white;
        border: none;
        border-radius: 10px;
        cursor: pointer;
    }

    .sorry-btn:hover {
        background: #ff4757;
    }
</style>
</head>

<body>

<div class="card">
    <h1>I'm Really Sorry 🥺</h1>
    <p>Please tell me your mood...</p>

    <div class="moods">
        <button onclick="setMood('angry')">😡 Angry</button>
        <button onclick="setMood('sad')">😔 Sad</button>
        <button onclick="setMood('okay')">😐 Okay</button>
        <button onclick="setMood('miss')">🥺 Miss me?</button>
    </div>

    <button class="sorry-btn" onclick="saySorry()">Click for Apology 💙</button>

    <div class="result" id="result"></div>
</div>

<script>
let mood = "";

function setMood(selectedMood) {
    mood = selectedMood;
    document.getElementById("result").innerHTML = "You feel: " + selectedMood;
}

function saySorry() {
    let message = "";

    if (mood === "angry") {
        message = "I know you're angry... and honestly, I deserve it. But I'm really sorry 🥺💙";
    } 
    else if (mood === "sad") {
        message = "Seeing you sad hurts me the most... please forgive me 💔";
    } 
    else if (mood === "okay") {
        message = "I'm glad you're a bit okay... can I make it better? 🥺";
    } 
    else if (mood === "miss") {
        message = "I miss you more... and I'm really really sorry ❤️";
    } 
    else {
        message = "At least pick a mood na 🥺";
    }

    document.getElementById("result").innerHTML = message;
}
</script>

</body>
</html>
